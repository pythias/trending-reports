<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending Report - {{CURRENT_DATE}}</title>
    <meta name="description" content="每日 GitHub Trending 报告，开源项目趋势追踪">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fira Sans', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        article:hover { box-shadow: 0 0 30px -5px rgba(34, 197, 94, 0.1); }
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
    <div class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-900 to-emerald-950/20 pointer-events-none"></div>

    <div class="relative z-10">
        <!-- Header -->
        <header class="border-b border-slate-800/50 bg-slate-900/80 backdrop-blur-xl sticky top-0 z-50">
            <div class="max-w-5xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <svg class="w-10 h-10" viewBox="0 0 98 96" fill="currentColor">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
                        </svg>
                        <div>
                            <h1 class="text-xl sm:text-2xl font-bold text-slate-100">GitHub Trending Report</h1>
                            <p class="text-sm text-slate-500">每日开源项目趋势追踪</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-slate-400">{{CURRENT_DATE}}</p>
                        <p class="text-xs text-slate-500">{{PREV_DATE}}</p>
                    </div>
                </div>

                <!-- Date Navigation -->
                <div class="mt-4 flex flex-wrap gap-2 items-center">
                    <span class="text-sm text-slate-500 mr-2">选择日期:</span>
                    {{DATE_NAV}}
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main class="max-w-5xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
            <!-- Legend -->
            <div class="mb-8 flex flex-wrap items-center gap-4 text-sm">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                    <span class="text-slate-400">新晋</span>
                    <span class="text-slate-500">- 首次上榜</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                    <span class="text-slate-400">留榜</span>
                    <span class="text-slate-500">- 连续在榜</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-amber-500"></span>
                    <span class="text-slate-400">落榜</span>
                    <span class="text-slate-500">- 本期下榜</span>
                </div>
                <div class="ml-auto text-sm text-slate-500">
                    {{SUMMARY}}
                </div>
            </div>

            <!-- Report sections -->
            {{NEW_REPOS_SECTION}}
            {{STAYED_REPOS_SECTION}}
            {{FALLEN_REPOS_SECTION}}

            <!-- Footer -->
            <footer class="mt-16 pt-8 border-t border-slate-800/50 text-center text-sm text-slate-500">
                <p>数据来源：<a href="https://github.com/trending" target="_blank" rel="noopener" class="text-emerald-500 hover:text-emerald-400 transition-colors">GitHub Trending</a></p>
                <p class="mt-2">报告每天 08:00 自动生成</p>
            </footer>
        </main>
    </div>
</body>
</html>
