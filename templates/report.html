<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending 报告 - {{CURRENT_DATE}}</title>
    <meta name="description" content="每日 GitHub Trending 报告，开源项目趋势追踪">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fira Sans', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        article:hover { box-shadow: 0 0 20px -5px rgba(34, 197, 94, 0.15); }
        .rank-cell { min-width: 60px; text-align: center; }
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
    <div class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-900 to-emerald-950/20 pointer-events-none"></div>

    <div class="relative z-10">
        <!-- Sticky Header -->
        <header class="border-b border-slate-800/50 bg-slate-900/90 backdrop-blur-xl sticky top-0 z-50">
            <div class="max-w-5xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <svg class="w-9 h-9" viewBox="0 0 98 96" fill="currentColor">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
                        </svg>
                        <div>
                            <h1 class="text-lg sm:text-xl font-bold text-slate-100">GitHub Trending 报告</h1>
                            <p class="text-xs text-slate-500">每日开源项目趋势追踪</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-slate-300 font-medium">{{CURRENT_DATE}}</p>
                        <p class="text-xs text-slate-500">{{PREV_DATE}}</p>
                    </div>
                </div>

                <!-- Date nav -->
                <div class="mt-3 flex flex-wrap gap-1.5 items-center">
                    <span class="text-xs text-slate-500 mr-1">📅</span>
                    {{DATE_NAV}}
                </div>
            </div>
        </header>

        <main class="max-w-5xl mx-auto px-4 py-6 sm:px-6 lg:px-8">

            <!-- 今日榜单 -->
            <section class="mb-8">
                <h2 class="text-lg font-semibold text-slate-100 mb-4 flex items-center gap-2">
                    <span>📊</span> 今日榜单
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-slate-700/50">
                                <th class="text-left py-2 px-3 text-slate-400 font-medium text-xs uppercase tracking-wider rank-cell">变化</th>
                                <th class="text-left py-2 px-3 text-slate-400 font-medium text-xs uppercase tracking-wider">项目</th>
                                <th class="text-left py-2 px-3 text-slate-400 font-medium text-xs uppercase tracking-wider hidden sm:table-cell">说明</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/50">
                            {{CHANGE_TABLE_ROWS}}
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 亮点 -->
            {{HIGHLIGHTS_SECTION}}

            <!-- 分类卡片 -->
            <div class="space-y-10">
                {{NEW_REPOS_SECTION}}
                {{STAYED_REPOS_SECTION}}
                {{FALLEN_REPOS_SECTION}}
            </div>

        </main>

        <footer class="border-t border-slate-800/50 mt-12 py-6 text-center text-xs text-slate-600">
            <p>每日 09:00 自动更新 · 数据来源 <a href="https://github.com/trending" class="underline hover:text-slate-400" target="_blank" rel="noopener">GitHub Trending</a></p>
        </footer>
    </div>
</body>
</html>
